<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="50%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>

    <!-- Glowing Accent Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0844" />
      <stop offset="100%" stop-color="#ffb199" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#8b949e" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .orbit {
        animation: rotate 20s linear infinite;
        transform-origin: 650px 150px;
      }
      .node-pulse-1 {
        animation: pulse 3s ease-in-out infinite alternate;
      }
      .node-pulse-2 {
        animation: pulse 4s ease-in-out infinite alternate 1s;
      }
      .node-pulse-3 {
        animation: pulse 2.5s ease-in-out infinite alternate 0.5s;
      }
      .circuit-line {
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: dash 8s linear infinite;
      }
      .particle {
        animation: pathMove 6s linear infinite;
      }

      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0% { r: 6px; opacity: 0.7; filter: drop-shadow(0 0 2px #00f2fe); }
        100% { r: 12px; opacity: 1; filter: drop-shadow(0 0 10px #00f2fe); }
      }
      @keyframes dash {
        to {
          stroke-dashoffset: 0;
        }
      }
      
      .title-text {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        fill: url(#textGrad);
      }
      .subtitle-text {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
        font-weight: 500;
        fill: #58a6ff;
        letter-spacing: 2px;
      }
      .accent-text {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
        font-weight: bold;
        fill: #ff0844;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bgGrad)" rx="15" />

  <!-- Grid Pattern overlay -->
  <g opacity="0.05">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250" stroke="#ffffff" stroke-width="1"/>
    <path d="M 100,0 L 100,300 M 200,0 L 200,300 M 300,0 L 300,300 M 400,0 L 400,300 M 500,0 L 500,300 M 600,0 L 600,300 M 700,0 L 700,300" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Circuit / Molecular pathways -->
  <g stroke="url(#cyanGrad)" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M 50,150 L 150,150 L 200,200 L 300,200" />
    <path d="M 150,150 L 180,100 L 280,100" />
    <path d="M 600,80 L 650,150 L 750,150" />
    <path d="M 650,150 L 600,220 L 500,220" stroke="url(#magentaGrad)"/>
  </g>

  <!-- Animated Circuit Path (Flowing energy) -->
  <path class="circuit-line" d="M 50,150 L 150,150 L 200,200 L 300,200" stroke="url(#cyanGrad)" stroke-width="3" fill="none" filter="url(#glow)" />
  <path class="circuit-line" d="M 650,150 L 600,220 L 500,220" stroke="url(#magentaGrad)" stroke-width="3" fill="none" filter="url(#glow)" />

  <!-- Molecular Structure Representation (Right side) -->
  <g class="orbit">
    <!-- Outer rings / orbits -->
    <circle cx="650" cy="150" r="80" stroke="#30363d" stroke-dasharray="5,5" fill="none" stroke-width="1.5"/>
    <circle cx="650" cy="150" r="50" stroke="#30363d" stroke-dasharray="4,4" fill="none" stroke-width="1.5"/>
    
    <!-- Outer energy nodes -->
    <circle cx="570" cy="150" r="5" fill="#ffb199" filter="url(#glow)"/>
    <circle cx="700" cy="190" r="4" fill="#00f2fe" filter="url(#glow)"/>
    <circle cx="650" cy="70" r="6" fill="#ff0844" filter="url(#glow)"/>
  </g>

  <!-- Central Molecular Junction -->
  <g transform="translate(650, 150)">
    <!-- Connections -->
    <line x1="0" y1="0" x2="-40" y2="-40" stroke="#8b949e" stroke-width="2"/>
    <line x1="0" y1="0" x2="40" y2="-40" stroke="#8b949e" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="50" stroke="#8b949e" stroke-width="2"/>

    <!-- Atoms (glowing) -->
    <circle cx="0" cy="0" r="10" fill="url(#magentaGrad)" filter="url(#glow)" />
    <circle class="node-pulse-1" cx="-40" cy="-40" r="8" fill="url(#cyanGrad)" />
    <circle class="node-pulse-2" cx="40" cy="-40" r="8" fill="url(#cyanGrad)" />
    <circle class="node-pulse-3" cx="0" cy="50" r="8" fill="url(#cyanGrad)" />
  </g>

  <!-- Left/Center Text Content -->
  <g transform="translate(60, 0)">
    <!-- Subtitle -->
    <text x="0" y="110" class="subtitle-text" font-size="14" font-weight="bold">AWESOME INTERVIEW PREPARATION</text>
    
    <!-- Title -->
    <text x="0" y="160" class="title-text" font-size="34">Molecular Electronics</text>
    <text x="0" y="200" class="title-text" font-size="34">Designer <tspan class="accent-text" fill="url(#magentaGrad)">Q&amp;A</tspan></text>
    
    <!-- Deco line -->
    <rect x="0" y="220" width="120" height="4" rx="2" fill="url(#cyanGrad)" filter="url(#glow)" />
  </g>

</svg>
